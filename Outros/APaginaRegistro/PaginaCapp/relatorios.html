<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Atendimento</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f6f9;
      }

      .menu {
        padding: 10px;
        background: #0078d4;
        display: flex;
        gap: 10px;
      }

      button {
        padding: 8px 15px;
        border: none;
        background: white;
        cursor: pointer;
        border-radius: 5px;
        font-weight: bold;
      }

      button:hover {
        background: #e6e6e6;
      }

      .container {
        padding: 5px;
      }

      iframe {
        width: 100%;
        height: 92vh;
        border: none;
        border-radius: 10px;
        background: white;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>

  <body>
    <div class="menu">
      <button id="RegNovo">Novo</button>
      <button id="RegAnti">Antigo</button>
    </div>

    <div class="container">
      <iframe
        id="mainFrame"
        src="https://apps.powerapps.com/play/e/687659ff-5f66-e8f3-9ad2-96d067ace609/app/8c405cc8-c779-4bce-bbad-e9a1ec5bfab1?tenantId=60fd783c-fa48-4af7-9416-f06a227cadf6&sourcehint=3&hint=b3d4eb4d-f9c3-4fdc-8e1c-fda3601148d2&sourcetime=1781375988977&source=vibe#"
        allowfullscreen
      >
      </iframe>
    </div>

    <script>
      const frame = document.getElementById("mainFrame");

      document.getElementById("RegAnti").addEventListener("click", () => {
        frame.src = "https://registrodechamadas.netlify.app/";
      });

      document.getElementById("RegNovo").addEventListener("click", () => {
        frame.src =
          "https://apps.powerapps.com/play/e/687659ff-5f66-e8f3-9ad2-96d067ace609/app/8c405cc8-c779-4bce-bbad-e9a1ec5bfab1?tenantId=60fd783c-fa48-4af7-9416-f06a227cadf6&sourcehint=3&hint=b3d4eb4d-f9c3-4fdc-8e1c-fda3601148d2&sourcetime=1781375988977&source=vibe#";
      });
    </script>
  </body>
</html>
